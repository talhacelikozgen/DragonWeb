<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dragon Board - Komuta Merkezi</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .command-center { background: #111; border: 2px solid #d4af37; padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        input, textarea, select { background: #222; color: #0f0; border: 1px solid #555; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #d4af37; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        .board { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: #111; border: 1px solid #0f0; padding: 15px; width: 300px; position: relative; }
        .ref-box { background: #222; border: 1px dashed #d4af37; margin-top: 10px; padding: 5px; font-size: 0.8em; }
        .tag { color: #d4af37; }
    </style>
</head>
<body>
    <h1>DRAGON BOARD - KOMUTA MERKEZİ</h1>

    <div class="command-center">
        <h3>YENİ EMİR GİRİŞİ</h3>
        <input type="text" id="taskTitle" placeholder="Görev Başlığı (Örn: FPS Silah Sistemi)">
        <select id="taskLang">
            <option value="C# (Unity)">C# (Unity)</option>
            <option value="Java (Sistem)">Java (Sistem)</option>
            <option value="Python (AI)">Python (AI)</option>
        </select>
        <textarea id="taskDesc" placeholder="Görev Detayları..."></textarea>
        <button onclick="sendOrder()">DRAGON'A EMRET</button>
    </div>

    <div class="board" id="main-board">
        </div>

    <script src="script.js"></script>
</body>
</html>
