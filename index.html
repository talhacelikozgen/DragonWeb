<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Helmet - Dinimiz İslam</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --ana-renk: #2c3e50; --vurgu-renk: #c0392b; --arka-plan: #f4f7f6; }
        body { margin: 0; font-family: 'Georgia', serif; background: var(--arka-plan); overflow-x: hidden; }
        
        .tab-wrapper {
            display: flex; justify-content: center; background: #fff; padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1001;
        }
        .tab-btn {
            padding: 12px 20px; border: none; background: none; color: #7f8c8d;
            cursor: pointer; font-weight: bold; transition: 0.3s; border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: var(--vurgu-renk); border-bottom: 3px solid var(--vurgu-renk); }
    </style>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        async function loadPage(page, btn) {
            const container = document.getElementById('content-area');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            try {
                const response = await fetch(page);
                const html = await response.text();
                container.innerHTML = html;

                // Scriptleri tekrar tetikle
                const scripts = container.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (err) { container.innerHTML = "Sayfa yüklenemedi."; }
        }
        window.onload = () => { loadPage('dinim.html', document.getElementById('default-tab')); };
    </script>
</head>
<body>
    <div class="tab-wrapper">
        <button id="default-tab" class="tab-btn" onclick="loadPage('dinim.html', this)">Dinimiz İslam</button>
        <button class="tab-btn" onclick="loadPage('dragon.html', this)">Dragon Helmet</button>
    </div>
    <div id="content-area"></div>
</body>
</html>
