<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Helmet & Dinimiz İslam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tab-wrapper">
        <button class="tab-btn active" onclick="yukle('dinimiz_islam.html', this)">Dinimiz İslam</button>
        <button class="tab-btn" onclick="yukle('dragon_helmet.html', this)">Dragon Helmet</button>
    </div>

    <div id="main-container">
        </div>

    <script>
        // Dosyayı dinamik olarak çekip container içine koyan fonksiyon
        async function yukle(dosyaAdi, element) {
            try {
                const response = await fetch(dosyaAdi);
                const html = await response.text();
                document.getElementById('main-container').innerHTML = html;

                // Butonların aktiflik durumunu güncelle
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                element.classList.add('active');

                // Eğer yüklenen dosya içinde script varsa onları çalıştır
                if(dosyaAdi === 'dinimiz_islam.html') {
                    veriyiYukle(); // dinimiz_islam.html içindeki fonksiyon
                }
            } catch (error) {
                console.error("Dosya yüklenemedi:", error);
            }
        }

        // Sayfa açıldığında ilk sekmeyi yükle
        window.onload = () => {
            yukle('dinimiz_islam.html', document.querySelector('.tab-btn'));
        };
    </script>
</body>
</html>
