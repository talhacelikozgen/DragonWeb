<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon AI | Intel Arc B580 Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .dragon-gradient {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }
        #resultImage { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-8">
        <h1 class="text-5xl font-black dragon-gradient bg-clip-text text-transparent mb-2">DRAGON AI</h1>
        <p class="text-slate-400 font-mono">Powered by Intel Arc B580 & PyTorch XPU</p>
    </div>

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-2xl border border-slate-700">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Hayalindeki Görsel (Prompt)</label>
                <textarea id="prompt" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="A majestic dragon flying over a futuristic city, digital art..."></textarea>
            </div>

            <button onclick="generateImage()" id="genBtn" class="w-full dragon-gradient py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-all active:scale-95">
                GÖRSELİ ÜRET
            </button>
        </div>

        <div class="mt-8 relative min-h-[300px] flex items-center justify-center border-2 border-dashed border-slate-700 rounded-xl overflow-hidden">
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500 mb-4"></div>
                <p class="text-slate-400 font-mono">Intel Arc B580 hesaplıyor...</p>
            </div>
            <img id="resultImage" class="hidden max-w-full h-auto shadow-lg" src="" alt="Dragon Output">
            <p id="placeholderText" class="text-slate-500 italic">Henüz bir görsel üretilmedi.</p>
        </div>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resultImg = document.getElementById('resultImage');
            const placeholder = document.getElementById('placeholderText');

            if (!prompt) return alert("Lütfen bir prompt girin!");

            // UI State: Loading
            btn.disabled = true;
            btn.innerText = "HESAPLANIYOR...";
            loader.classList.remove('hidden');
            resultImg.classList.add('hidden');
            placeholder.classList.add('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, steps: 20 })
                });

                const data = await response.json();
                
                // IP üzerinden değil, dosya yolundan görseli çekmek için:
                // API image_url dönüyor. Local ortamda olduğumuz için statik dosya sunumuna dikkat.
                resultImg.src = `http://127.0.0.1:8000/outputs/${data.image_url.split('/').pop()}`;
                resultImg.classList.remove('hidden');
                
            } catch (error) {
                alert("Motor henüz hazır olmayabilir veya bir hata oluştu!");
                console.error(error);
                placeholder.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "GÖRSELİ ÜRET";
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
