<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Helmet - Günlük Hikmet</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdfdfd; color: #333; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .tarih { color: #c0392b; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .nasihat-box { max-width: 600px; text-align: center; padding: 30px; border-bottom: 2px solid #eee; }
        #nasihat-metni { font-size: 1.6rem; line-height: 1.5; color: #2c3e50; }
        
        /* Admin Bölümü Stilleri */
        .admin-area { background: #eee; padding: 20px; border-top: 1px solid #ccc; font-family: sans-serif; }
        .admin-input { width: 90%; max-width: 300px; padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        #admin-panel { display: none; margin-top: 15px; } /* Başlangıçta gizli */
        .admin-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="tarih" id="gercek-tarih"></div>
        <div id="gun-adi" style="color: #888; margin-bottom: 20px;"></div>
        
        <div class="nasihat-box">
            <p id="nasihat-metni">Yükleniyor...</p>
        </div>
    </div>

    <div class="admin-area">
        <small onclick="document.getElementById('admin-panel').style.display='block'" style="cursor:pointer; color:#aaa;">Yönetim Paneli</small>
        
        <div id="admin-panel">
            <input type="password" id="token" class="admin-input" placeholder="GitHub Token"> <br>
            <input type="text" id="yeni-tarih" class="admin-input" placeholder="Tarih (Örn: 04-17)"> <br>
            <textarea id="yeni-metin" class="admin-input" rows="3" placeholder="Yeni Nasihat"></textarea> <br>
            <button class="admin-btn" onclick="yayinla()">Yayınla ve Güncelle</button>
            <p id="durum" style="font-size: 0.8rem;"></p>
        </div>
    </div>

<script>
// --- 1. VERİ ÇEKME FONKSİYONU ---
async function veriyiYukle() {
    const simdi = new Date();
    document.getElementById('gercek-tarih').innerText = simdi.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('gun-adi').innerText = simdi.toLocaleDateString('tr-TR', { weekday: 'long' });

    try {
        const response = await fetch('arsiv.json');
        const veriler = await response.json();
        const anahtar = `${String(simdi.getMonth() + 1).padStart(2, '0')}-${String(simdi.getDate()).padStart(2, '0')}`;
        document.getElementById('nasihat-metni').innerText = veriler[anahtar] || "Bugün için bir kayıt bulunamadı.";
    } catch (e) { document.getElementById('nasihat-metni').innerText = "Arşiv yüklenemedi."; }
}

// --- 2. YAYINLAMA FONKSİYONU (ADMİN) ---
async function yayinla() {
    const token = document.getElementById('token').value;
    const tarih = document.getElementById('yeni-tarih').value;
    const metin = document.getElementById('yeni-metin').value;
    const durum = document.getElementById('durum');

    // BURAYI KENDİ BİLGİLERİNLE DOLDUR
    const user = "talhacelikozgen"; 
    const repo = "DragonWeb";
    const url = `https://api.github.com/repos/${user}/${repo}/contents/arsiv.json`;

    try {
        durum.innerText = "Güncelleniyor...";
        const res = await fetch(url, { headers: { Authorization: `token ${token}` } });
        const fileData = await res.json();
        
        let content = JSON.parse(atob(fileData.content));
        content[tarih] = metin; // Yeni nasihati ekle veya olanı güncelle
        
        const update = await fetch(url, {
            method: "PUT",
            headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: `${tarih} güncellendi`,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 4)))),
                sha: fileData.sha
            })
        });

        if(update.ok) { 
            durum.style.color = "green";
            durum.innerText = "Başarıyla yayınlandı! Sayfayı yenileyin."; 
        } else { throw new Error(); }
    } catch (e) { 
        durum.style.color = "red";
        durum.innerText = "Hata! Token veya bilgiler yanlış."; 
    }
}

veriyiYukle();
</script>
</body>
</html>
