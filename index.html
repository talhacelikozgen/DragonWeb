<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Helmet - Hikmetli Sözler</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdfdfd; color: #333; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .tarih { color: #c0392b; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        
        .slider-container { display: flex; align-items: center; justify-content: center; max-width: 800px; width: 100%; position: relative; }
        .nasihat-box { flex: 1; padding: 30px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        #nasihat-metni { font-size: 1.6rem; line-height: 1.5; color: #2c3e50; margin-bottom: 20px; }
        
        .alt-cizgi { border-bottom: 1px solid #eee; width: 60%; margin: 10px auto; }
        .kaynak { font-size: 0.9rem; color: #999; font-style: italic; }

        .nav-btn { background: none; border: 2px solid #eee; color: #ccc; font-size: 2rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.3s; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; outline: none; }
        .nav-btn:hover:not(:disabled) { border-color: #c0392b; color: #c0392b; }
        .nav-btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .admin-area { background: #eee; padding: 20px; border-top: 1px solid #ccc; font-family: sans-serif; text-align: center; }
        #admin-panel { display: none; margin-top: 15px; }
        .admin-input { width: 90%; max-width: 350px; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="tarih" id="gercek-tarih"></div>
        <div id="gun-adi" style="color: #888; margin-bottom: 20px;"></div>
