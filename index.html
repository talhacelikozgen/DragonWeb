<div class="nasihat-karti" style="text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <div id="gercek-tarih" style="font-size: 1.2rem; color: #c0392b; font-weight: bold; margin-bottom: 10px;"></div>
    <div id="gun-adi" style="font-size: 1rem; color: #777; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;"></div>
    
    <hr style="width: 50px; border: 1px solid #eee; margin: 20px auto;">

    <p id="nasihat-metni" style="font-size: 1.4rem; font-family: 'Times New Roman', serif; line-height: 1.6; color: #2c3e50;">Yükleniyor...</p>
</div>

<script>
async function sistemiBaslat() {
    // 1. GERÇEK TARİHİ HESAPLA VE YAZ
    const simdi = new Date();
    const gun = simdi.getDate();
    const ayIsmi = simdi.toLocaleDateString('tr-TR', { month: 'long' });
    const yil = simdi.getFullYear();
    const gunIsmi = simdi.toLocaleDateString('tr-TR', { weekday: 'long' });

    document.getElementById('gercek-tarih').innerText = `${gun} ${ayIsmi} ${yil}`;
    document.getElementById('gun-adi').innerText = gunIsmi;

    // 2. JSON'DAN İLGİLİ NASİHATİ ÇEK
    try {
        const response = await fetch('arsiv.json');
        const veriler = await response.json();
        
        // JSON anahtarı için "04-16" formatını oluştur
        const ayNo = String(simdi.getMonth() + 1).padStart(2, '0');
        const gunNo = String(simdi.getDate()).padStart(2, '0');
        const anahtar = `${ayNo}-${gunNo}`;
        
        // Veriyi ekrana bas
        document.getElementById('nasihat-metni').innerText = veriler[anahtar] || "Bugün için bir hikmetli söz eklenmemiş.";
        
    } catch (hata) {
        document.getElementById('nasihat-metni').innerText = "Veri dosyası yüklenemedi.";
    }
}

sistemiBaslat();
</script>
