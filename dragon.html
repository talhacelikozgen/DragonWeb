<style>
    .dragon-container { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; font-family: 'Segoe UI', sans-serif; }
    .stack-wrapper { position: relative; height: 480px; width: 100%; perspective: 1200px; margin-top: 20px; display: flex; justify-content: center; align-items: center; }
    
    .proje-kart {
        position: absolute; width: 90%; max-width: 380px; background: white; border-radius: 20px; padding: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid #c0392b;
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; pointer-events: none;
        transform: translateZ(-100px) scale(0.8);
    }

    .proje-kart.active { opacity: 1; z-index: 10; pointer-events: all; transform: translateX(0) translateZ(0) scale(1); }
    .proje-kart.prev { opacity: 0.4; z-index: 5; transform: translateX(-105%) translateZ(-200px) scale(0.8) rotate(-5deg); filter: blur(2px); }
    .proje-kart.next { opacity: 0.4; z-index: 5; transform: translateX(105%) translateZ(-200px) scale(0.8) rotate(5deg); filter: blur(2px); }
    .proje-kart.hidden { opacity: 0; z-index: 0; transform: translateX(0) translateZ(-400px) scale(0.5); }

    .k-tarih { color: #bdc3c7; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin-bottom: 12px; font-weight: bold; }
    .k-metin { color: #5d6d7e; font-size: 0.9rem; line-height: 1.5; max-height: 120px; overflow-y: auto; text-align: left; }
    .k-img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; margin-top: 15px; }

    .nav-controls { display: flex; justify-content: center; gap: 30px; margin-top: 25px; }
    .stack-btn { background: #fff; border: 1px solid #eee; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; color: #333; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .stack-btn:disabled { opacity: 0.2; cursor: not-allowed; }
</style>

<div class="dragon-container">
    <img src="images/dragon-logo.png" style="width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 10px; display: block; border: 2px solid #eee;">
    <h1 style="font-size: 1.4rem; color: #2c3e50; margin: 0;">Dragon Helmet</h1>
    <div style="width: 30px; height: 3px; background: #c0392b; margin: 10px auto 25px;"></div>

    <div class="stack-wrapper" id="stack-container">
        <p id="durum-mesaji" style="color:#bbb; font-style: italic;">Veriler aranıyor...</p>
    </div>

    <div class="nav-controls">
        <button class="stack-btn" id="prevBtn" onclick="slide(-1)">❮</button>
        <button class="stack-btn" id="nextBtn" onclick="slide(1)">❯</button>
    </div>
</div>

<script>
    let kartVerileri = [];
    let aktifIndex = 0;

    async function projeleriYukle() {
        const durum = document.getElementById('durum-mesaji');
        try {
            // Önce ./ ile deniyoruz, olmazsa diğeri
            const yollar = ['./data/projeler.json', 'data/projeler.json'];
            let response;
            
            for (let yol of yollar) {
                console.log("Denenen yol:", yol);
                response = await fetch(yol + '?v=' + Date.now());
                if (response.ok) break;
            }

            if (!response.ok) {
                throw new Error(`Dosya bulunamadı (404). Lütfen GitHub'da 'data' klasörünü ve 'projeler.json' dosyasını kontrol et.`);
            }

            const data = await response.json();
            console.log("Gelen Veri:", data);

            if (!Array.isArray(data) || data.length === 0) {
                durum.innerText = "JSON dosyası yüklendi ama içinde kayıt yok.";
                return;
            }

            // En güncel olanın en önde (ilk kart) olması için listeyi ters çeviriyoruz
            kartVerileri = data.reverse(); 
            kartlariOlustur();
            
        } catch (e) {
            console.error("HATA:", e);
            durum.style.color = "#e74c3c";
            durum.innerHTML = `<strong>Bağlantı Sorunu!</strong><br>${e.message}`;
        }
    }

    function kartlariOlustur() {
        const container = document.getElementById('stack-container');
        container.innerHTML = ''; 

        kartVerileri.forEach((p, index) => {
            let gorselHtml = '';
            if (p.gorsel && p.gorsel !== "") {
                const imgPath = p.gorsel.startsWith('images/') ? p.gorsel : 'images/' + p.gorsel;
                gorselHtml = `<img src="${imgPath}" class="k-img" onerror="this.style.display='none'">`;
            }

            const div = document.createElement('div');
            div.className = 'proje-kart';
            div.id = `kart-${index}`;
            div.innerHTML = `
                <div class="k-tarih">${p.tarih || ''}</div>
                <div class="k-baslik">${p.baslik || 'Başlıksız'}</div>
                <div class="k-metin">${p.metin || ''}</div>
                ${gorselHtml}
            `;
            container.appendChild(div);
        });
        
        guncelle();
    }

    function guncelle() {
        if (kartVerileri.length === 0) return;
        kartVerileri.forEach((_, i) => {
            const kart = document.getElementById(`kart-${i}`);
            if (!kart) return;
            
            kart.classList.remove('active', 'prev', 'next', 'hidden');
            
            if (i === aktifIndex) kart.classList.add('active');
            else if (i === aktifIndex - 1) kart.classList.add('prev');
            else if (i === aktifIndex + 1) kart.classList.add('next');
            else kart.classList.add('hidden');
        });
        
        document.getElementById('prevBtn').disabled = (aktifIndex === 0);
        document.getElementById('nextBtn').disabled = (aktifIndex === kartVerileri.length - 1);
    }

    function slide(yon) {
        let yeniIndex = aktifIndex + yon;
        if (yeniIndex >= 0 && yeniIndex < kartVerileri.length) {
            aktifIndex = yeniIndex;
            guncelle();
        }
    }

    // Direkt başlat
    projeleriYukle();
</script>
