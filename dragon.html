<style>
    .dragon-container { 
        max-width: 500px; 
        margin: 20px auto; 
        padding: 15px; 
        text-align: center; 
        font-family: sans-serif;
    }
    
    .logo-area img { 
        width: 80px; height: 80px; 
        border-radius: 50%; 
        border: 3px solid #f0f0f0; 
        margin-bottom: 10px;
        transition: transform 0.3s;
    }
    .logo-area img:hover { transform: scale(1.1); }

    .kart-cerceve { 
        min-height: 300px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        margin: 20px 0;
    }

    .proje-kart {
        background: white; 
        width: 100%; 
        padding: 20px; 
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        border-top: 4px solid #c0392b;
        text-align: left;
    }

    .k-tarih { color: #bbb; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .k-metin { color: #555; font-size: 0.95rem; line-height: 1.5; }
    .k-img { width: 100%; border-radius: 8px; margin-top: 15px; display: block; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; }
    .nav-btn { 
        background: #34495e; color: white; border: none; 
        padding: 10px 18px; border-radius: 6px; cursor: pointer;
    }
    .nav-btn:disabled { background: #eee; color: #ccc; cursor: not-allowed; }
    .sayfalar { font-size: 0.85rem; color: #999; font-weight: bold; }
</style>

<div class="dragon-container">
    <div class="logo-area">
        <img src="images/dragon-logo.png" alt="Dragon Logo">
        <h2 style="margin:0; color:#2c3e50;">Dragon Helmet</h2>
        <div style="width:30px; height:2px; background:#c0392b; margin:10px auto;"></div>
    </div>

    <div class="kart-cerceve" id="proje-yukleme-alani">
        <p style="color:#ccc;">Projeler aranıyor...</p>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="btnGeri" onclick="projeDegistir(-1)">❮</button>
        <span class="sayfalar" id="sayfaBilgi">0 / 0</span>
        <button class="nav-btn" id="btnIleri" onclick="projeDegistir(1)">❯</button>
    </div>
</div>

<script>
    let dProjeler = [];
    let dAktifIdx = 0;

    async function dVeriYukle() {
        const alan = document.getElementById('proje-yukleme-alani');
        try {
            // Zaman damgası (Date.now) ile cache temizleme yapıyoruz
            const res = await fetch('data/projeler.json?t=' + Date.now());
            if (!res.ok) throw new Error("JSON dosyasına ulaşılamadı.");
            
            dProjeler = await res.json();
            if (dProjeler.length === 0) {
                alan.innerHTML = "<p>Henüz proje eklenmemiş.</p>";
                return;
            }

            // Yeni haber en üstte olsun
            dProjeler.reverse();
            dGoster();
        } catch (err) {
            alan.innerHTML = `<p style="color:red; font-size:0.8rem;">Hata: ${err.message}</p>`;
        }
    }

    function dGoster() {
        const alan = document.getElementById('proje-yukleme-alani');
        const p = dProjeler[dAktifIdx];
        
        let imgTag = "";
        if (p.gorsel) {
            const yol = p.gorsel.startsWith('images/') ? p.gorsel : 'images/' + p.gorsel;
            imgTag = `<img src="${yol}" class="k-img" onerror="this.style.display='none'">`;
        }

        alan.innerHTML = `
            <div class="proje-kart">
                <div class="k-tarih">${p.tarih}</div>
                <div class="k-baslik">${p.baslik}</div>
                <div class="k-metin">${p.metin}</div>
                ${imgTag}
            </div>
        `;

        document.getElementById('sayfaBilgi').innerText = `${dAktifIdx + 1} / ${dProjeler.length}`;
        document.getElementById('btnGeri').disabled = (dAktifIdx === 0);
        document.getElementById('btnIleri').disabled = (dAktifIdx === dProjeler.length - 1);
    }

    function projeDegistir(yon) {
        dAktifIdx += yon;
        dGoster();
    }

    // Fonksiyon isimlerini d harfiyle başlattım ki diğer scriptlerle çakışmasın
    dVeriYukle();
</script>
