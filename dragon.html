<style>
    /* ANA KONTEYNER */
    .dragon-container {
        font-family: 'Georgia', serif;
        text-align: center;
        max-width: 500px;
        margin: 0 auto;
        padding: 10px;
    }

    .logo-area img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0f0f0; margin-bottom: 10px; }

    /* OKLAR VE NAVİGASYON (YUKARI TAŞINDI) */
    .nav-bar-ust {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 10px;
    }

    .nav-btn-ok {
        background: #34495e;
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1rem;
    }

    .nav-btn-ok:hover { background: #c0392b; }
    .nav-btn-ok:disabled { background: #eee; color: #ccc; cursor: not-allowed; }

    /* KART YAPISI */
    .kart-cerceve { min-height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .proje-kart {
        background: white; width: 100%; padding: 20px; border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid #c0392b;
        text-align: left; position: relative;
    }

    [contenteditable="true"] { border: 1px dashed #c0392b; padding: 5px; border-radius: 4px; background-color: #fffcfc; outline: none; }

    .k-tarih { color: #bbb; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .k-metin { color: #555; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
    .k-img { width: 100%; border-radius: 8px; margin-top: 15px; display: block; object-fit: cover; }

    /* YÖNETİM BUTONLARI */
    .save-btn { background: #27ae60 !important; font-weight: bold; width: 100%; margin-top: 10px; }
    .new-btn { background: #2980b9 !important; margin: 0; }
    .delete-btn { background: #c0392b !important; margin-top: 15px; font-size: 0.8rem; width: 100%; }

    .loading-overlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction: column; font-weight: bold; color: #c0392b; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<div id="loader" class="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #c0392b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;"></div>
    YAYINLANIYOR...
</div>

<div class="dragon-container">
    <div class="logo-area">
        <img src="images/dragon-logo.png" alt="Dragon Logo" onerror="this.src='https://via.placeholder.com/80'">
        <h2 style="margin:0; color:#2c3e50;">Dragon Helmet</h2>
        <div style="width:30px; height:2px; background:#c0392b; margin:10px auto;"></div>
    </div>

    <div class="nav-bar-ust">
        <button class="nav-btn-ok" id="btnGeri" onclick="projeDegistir(-1)">❮</button>
        
        <div id="admin-extra" style="display:none;">
            <button class="nav-btn-ok new-btn" onclick="yeniProjeEkle()">+</button>
        </div>

        <button class="nav-btn-ok" id="btnIleri" onclick="projeDegistir(1)">❯</button>
    </div>

    <div class="kart-cerceve" id="proje-yukleme-alani">
        <p style="color:#ccc;">Yükleniyor...</p>
    </div>

    <div id="admin-actions" style="display:none; margin-top: 10px;">
        <button class="nav-btn-ok save-btn" onclick="githubKaydet()">YAYINLA</button>
    </div>
</div>

<script>
const REPO = "talhacelikozgen/DragonWeb";
window.dProjeler = [];
window.dAktifIdx = 0;
window.isAdmin = false;
window.ghToken = "";

window.adminModunuAc = function(token) {
    window.ghToken = token;
    window.isAdmin = true;
    const adminActionsEl = document.getElementById('admin-actions');
    const adminExtraEl = document.getElementById('admin-extra');
    if (adminActionsEl) adminActionsEl.style.display = 'block';
    if (adminExtraEl) adminExtraEl.style.display = 'block';
    window.dGoster();
};

window.dVeriYukle = async function() {
    try {
        const url = new URL('data/projeler.json', window.location.href);
        url.searchParams.set('t', Date.now());
        const res = await fetch(url.href);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Veri format hatası');
        window.dProjeler = [...data].reverse();
        window.dAktifIdx = 0;
        window.dGoster();
    } catch (err) {
        const alan = document.getElementById('proje-yukleme-alani');
        if (alan) {
            alan.innerHTML = `<p style='color:#c0392b; padding:20px;'>Veri yüklenemedi: ${err.message}</p>`;
        }
        console.error('Dragon verisi yüklenemedi:', err);
    }
};

window.dGoster = function() {
    const alan = document.getElementById('proje-yukleme-alani');
    if (!alan) return;

    if (!window.dProjeler || window.dProjeler.length === 0) {
        alan.innerHTML = '<p style="color:#ccc; padding:20px;">Proje yok.</p>';
        const btnGeri = document.getElementById('btnGeri');
        const btnIleri = document.getElementById('btnIleri');
        if (btnGeri) btnGeri.disabled = true;
        if (btnIleri) btnIleri.disabled = true;
        return;
    }

    const p = window.dProjeler[window.dAktifIdx];
    const editable = window.isAdmin ? 'contenteditable="true"' : '';
    const gorsel = p.gorsel ? (p.gorsel.startsWith('images/') ? p.gorsel : 'images/' + p.gorsel) : '';
    const imgHtml = gorsel ? `<img src="${gorsel}" class="k-img" onerror="this.style.display='none'">` : '';

    alan.innerHTML = `
        <div class="proje-kart">
            <div class="k-tarih" ${editable} id="ed-tarih">${p.tarih || ''}</div>
            <div class="k-baslik" ${editable} id="ed-baslik">${p.baslik || ''}</div>
            <div class="k-metin" ${editable} id="ed-metin">${p.metin || ''}</div>
            <div id="img-container">${imgHtml}</div>
            ${window.isAdmin ? `
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                    <input type="file" id="file-input" accept="image/*" style="font-size:0.7rem; width:100%;">
                    <button class="nav-btn-ok delete-btn" onclick="window.projeSil()">Bu Projeyi Sil</button>
                </div>
            ` : ''}
        </div>
    `;

    const btnGeri = document.getElementById('btnGeri');
    const btnIleri = document.getElementById('btnIleri');
    if (btnGeri) btnGeri.disabled = (window.dAktifIdx === 0);
    if (btnIleri) btnIleri.disabled = (window.dAktifIdx === window.dProjeler.length - 1);
};

window.projeDegistir = function(yon) {
    if (!window.dProjeler || window.dProjeler.length === 0) return;
    const yeni = window.dAktifIdx + yon;
    if (yeni >= 0 && yeni < window.dProjeler.length) {
        window.dAktifIdx = yeni;
        window.dGoster();
    }
};

window.yeniProjeEkle = function() {
    const simdi = new Date();
    const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    const tarihStr = `${simdi.getDate()} ${aylar[simdi.getMonth()]} ${simdi.getFullYear()}`;
    window.dProjeler.unshift({ id: Date.now(), tarih: tarihStr, baslik: "Yeni Başlık", metin: "İçerik...", gorsel: "" });
    window.dAktifIdx = 0;
    window.dGoster();
};

window.projeSil = function() {
    if (!confirm("Silinsin mi?")) return;
    window.dProjeler.splice(window.dAktifIdx, 1);
    window.dAktifIdx = 0;
    window.dGoster();
};

window.githubKaydet = async function() {
    const loader = document.getElementById('loader');
    if (loader) loader.style.display = "flex";
    try {
        const p = window.dProjeler[window.dAktifIdx];
        const edTarih = document.getElementById('ed-tarih');
        const edBaslik = document.getElementById('ed-baslik');
        const edMetin = document.getElementById('ed-metin');

        if (edTarih) p.tarih = edTarih.innerText.trim();
        if (edBaslik) p.baslik = edBaslik.innerText.trim();
        if (edMetin) p.metin = edMetin.innerText.trim();

        const fileInput = document.getElementById('file-input');
        if (fileInput && fileInput.files && fileInput.files[0]) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            const result = await new Promise((resolve, reject) => {
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            const base64Content = result.split(',')[1];
            const dosyaAdi = `img-${Date.now()}.png`;
            const imgRes = await fetch(`https://api.github.com/repos/${REPO}/contents/images/${dosyaAdi}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${window.ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Upload img', content: base64Content })
            });
            if (imgRes.ok) p.gorsel = dosyaAdi;
        }

        const jsonUrl = `https://api.github.com/repos/${REPO}/contents/data/projeler.json`;
        const getFile = await fetch(jsonUrl, { headers: { 'Authorization': `token ${window.ghToken}`} });
        const fileData = await getFile.json();
        if (!fileData.sha) throw new Error('SHA bilgisi alınamadı');

        const updateRes = await fetch(jsonUrl, {
            method: 'PUT',
            headers: { 'Authorization': `token ${window.ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: 'Update',
                content: btoa(unescape(encodeURIComponent(JSON.stringify([...window.dProjeler].reverse(), null, 4)))),
                sha: fileData.sha
            })
        });
        if (!updateRes.ok) {
            const text = await updateRes.text();
            throw new Error(text || 'Kaydetme hatası');
        }
        alert('Yayınlandı!');
    } catch (e) {
        alert('Hata: ' + e.message);
        console.error(e);
    } finally {
        if (loader) loader.style.display = 'none';
        window.dGoster();
    }
};

window.dVeriYukle();
</script>
