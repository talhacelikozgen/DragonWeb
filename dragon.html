<style>
    .proje-listesi { max-width: 600px; margin: 0 auto; text-align: left; padding-bottom: 50px; }
    .proje-kart { 
        background: white; border-radius: 12px; padding: 20px; 
        margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        border-left: 4px solid #c0392b; animation: slideUp 0.5s ease-out;
    }
    .proje-baslik { font-weight: bold; color: #2c3e50; font-size: 1.2rem; margin-bottom: 5px; }
    .proje-tarih { color: #bdc3c7; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; }
    .proje-metin { color: #5d6d7e; line-height: 1.6; }
    .proje-img { width: 100%; border-radius: 8px; margin-top: 15px; display: none; } /* Görsel varsa JS açacak */

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="dragon-container">
    <img src="images/Dragon-logo.png" alt="Logo" class="dragon-logo"> <h1 class="vizyon-baslik">Dragon Helmet</h1>
    <p class="vizyon-metni">"Hayal gücünün sınırlarını kodlarla zorluyoruz."</p>
    <div class="sade-cizgi"></div>

    <div id="proje-akisi" class="proje-listesi">
        <p style="text-align:center; color:#ccc;">Yazılar yükleniyor...</p>
    </div>
</div>

<script>
    async function projeleriYukle() {
        try {
            const response = await fetch('data/projeler.json?t=' + new Date().getTime());
            const projeler = await response.json();
            const container = document.getElementById('proje-akisi');
            container.innerHTML = ''; // Temizle

            projeler.reverse().forEach(p => { // En yeni en üstte
                const gorselHtml = p.gorsel ? `<img src="${p.gorsel}" class="proje-img" style="display:block;">` : '';
                
                container.innerHTML += `
                    <div class="proje-kart">
                        <div class="proje-tarih">${p.tarih}</div>
                        <div class="proje-baslik">${p.baslik}</div>
                        <div class="proje-metin">${p.metin}</div>
                        ${gorselHtml}
                    </div>
                `;
            });
        } catch (e) {
            document.getElementById('proje-akisi').innerHTML = "Henüz bir paylaşım yapılmadı.";
        }
    }
    projeleriYukle();
</script>
