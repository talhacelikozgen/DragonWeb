<style>
    .dragon-container { font-family: 'Georgia', serif; text-align: center; max-width: 500px; margin: 0 auto; padding: 10px; }
    .logo-area img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0f0f0; margin-bottom: 10px; }
    
    .nav-bar-ust { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 10px; }
    .nav-btn-ok { 
        background: #34495e; color: white; border: none; width: 40px; height: 40px; 
        border-radius: 50%; cursor: pointer; transition: 0.3s; font-size: 1rem;
        display: flex; justify-content: center; align-items: center;
    }
    .nav-btn-ok:hover { background: #c0392b; }
    .nav-btn-ok:disabled { background: #eee; color: #ccc; cursor: not-allowed; }

    .proje-kart {
        background: white; width: 100%; padding: 20px; border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid #c0392b;
        text-align: left; box-sizing: border-box;
    }
    [contenteditable="true"] { border: 1px dashed #c0392b; padding: 5px; border-radius: 4px; background-color: #fffcfc; outline: none; }
    .k-tarih { color: #bbb; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .k-metin { color: #555; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
    .k-img { width: 100%; border-radius: 8px; margin-top: 15px; display: block; object-fit: cover; }

    .save-btn { background: #27ae60 !important; font-weight: bold; width: 100%; margin-top: 10px; border-radius: 8px !important; height: 45px; }
    .delete-btn { background: #c0392b !important; margin-top: 15px; font-size: 0.8rem; width: 100%; border-radius: 8px !important; height: 35px; }
    
    .loading-overlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction: column; font-weight: bold; color: #c0392b; }
</style>

<div id="loader" class="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #c0392b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;"></div>
    YAYINLANIYOR...
</div>

<div class="dragon-container">
    <div class="logo-area">
        <img src="images/dragon-logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80'">
        <h2 style="margin:0; color:#2c3e50;">Dragon Helmet</h2>
        <div style="width:30px; height:2px; background:#c0392b; margin:10px auto;"></div>
    </div>

    <div class="nav-bar-ust">
        <button class="nav-btn-ok" id="btnGeri" onclick="projeDegistir(-1)">❮</button>
        <div id="admin-extra" style="display:none;">
            <button class="nav-btn-ok" style="background:#2980b9;" onclick="yeniProjeEkle()">+</button>
        </div>
        <button class="nav-btn-ok" id="btnIleri" onclick="projeDegistir(1)">❯</button>
    </div>

    <div id="proje-yukleme-alani">
        <p style="color:#ccc; padding:20px;">Yükleniyor...</p>
    </div>

    <div id="admin-actions" style="display:none; margin-top: 10px;">
        <button class="nav-btn-ok save-btn" onclick="githubKaydet()">YAYINLA</button>
    </div>
</div>

<script>
// Değişkenleri window yerine script kapsamında tanımlayalım (Daha güvenli)
let dProjeler = [];
let dAktifIdx = 0;
let isAdmin = false;
let ghToken = "";
const REPO = "talhacelikozgen/DragonWeb";

// Global erişim için window'a bağla (index.html'den çağrılabilmesi için)
window.adminModunuAc = function(token) {
    ghToken = token;
    isAdmin = true;
    document.getElementById('admin-actions').style.display = 'block';
    document.getElementById('admin-extra').style.display = 'block';
    dGoster();
};

async function dVeriYukle() {
    const alan = document.getElementById('proje-yukleme-alani');
    try {
        // Cache engellemek için t= parametresi ekle
        const response = await fetch('data/projeler.json?t=' + Date.now());
        if (!response.ok) throw new Error("JSON dosyası bulunamadı.");
        const data = await response.json();
        
        // Veriyi ters çevir (Son eklenen en başa)
        dProjeler = Array.isArray(data) ? data.reverse() : [];
        dGoster();
    } catch (err) {
        console.error("Hata:", err);
        alan.innerHTML = `<p style="color:#c0392b; padding:20px;">Hata: Projeler yüklenemedi.</p>`;
    }
}

function dGoster() {
    const alan = document.getElementById('proje-yukleme-alani');
    if (dProjeler.length === 0) {
        alan.innerHTML = '<p style="color:#ccc; padding:20px;">Henüz proje eklenmemiş.</p>';
        return;
    }

    const p = dProjeler[dAktifIdx];
    const editable = isAdmin ? 'contenteditable="true"' : '';
    
    // Görsel yolunu kontrol et
    let gorselYolu = "";
    if (p.gorsel) {
        gorselYolu = p.gorsel.startsWith('images/') ? p.gorsel : 'images/' + p.gorsel;
    }

    alan.innerHTML = `
        <div class="proje-kart">
            <div class="k-tarih" ${editable} id="ed-tarih">${p.tarih || 'Tarih'}</div>
            <div class="k-baslik" ${editable} id="ed-baslik">${p.baslik || 'Başlık'}</div>
            <div class="k-metin" ${editable} id="ed-metin">${p.metin || 'Açıklama...'}</div>
            ${gorselYolu ? `<img src="${gorselYolu}" class="k-img" onerror="this.style.display='none'">` : ''}
            ${isAdmin ? `
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                    <input type="file" id="file-input" accept="image/*" style="font-size:0.7rem; width:100%;">
                    <button class="delete-btn" onclick="projeSil()">Bu Projeyi Sil</button>
                </div>
            ` : ''}
        </div>
    `;

    document.getElementById('btnGeri').disabled = (dAktifIdx === 0);
    document.getElementById('btnIleri').disabled = (dAktifIdx === dProjeler.length - 1);
}

// Navigasyon Fonksiyonları
window.projeDegistir = function(yon) {
    const yeniIdx = dAktifIdx + yon;
    if (yeniIdx >= 0 && yeniIdx < dProjeler.length) {
        dAktifIdx = yeniIdx;
        dGoster();
    }
};

window.yeniProjeEkle = function() {
    const simdi = new Date();
    const aylar = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    const tarihStr = `${simdi.getDate()} ${aylar[simdi.getMonth()]} ${simdi.getFullYear()}`;
    
    dProjeler.unshift({
        id: Date.now(),
        tarih: tarihStr,
        baslik: "Yeni Proje Başlığı",
        metin: "İçerik detaylarını buraya yazın...",
        gorsel: ""
    });
    dAktifIdx = 0;
    dGoster();
};

window.projeSil = function() {
    if (!confirm("Bu projeyi silmek istediğinize emin misiniz?")) return;
    dProjeler.splice(dAktifIdx, 1);
    dAktifIdx = 0;
    dGoster();
};

window.githubKaydet = async function() {
    const loader = document.getElementById('loader');
    loader.style.display = "flex";
    try {
        const p = dProjeler[dAktifIdx];
        p.tarih = document.getElementById('ed-tarih').innerText.trim();
        p.baslik = document.getElementById('ed-baslik').innerText.trim();
        p.metin = document.getElementById('ed-metin').innerText.trim();

        const fileInput = document.getElementById('file-input');
        if (fileInput && fileInput.files[0]) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            const base64Data = await new Promise((resolve) => {
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const dosyaAdi = `img-${Date.now()}.png`;
            await fetch(`https://api.github.com/repos/${REPO}/contents/images/${dosyaAdi}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Resim yukle', content: base64Data })
            });
            p.gorsel = dosyaAdi;
        }

        const jsonUrl = `https://api.github.com/repos/${REPO}/contents/data/projeler.json`;
        const fileRes = await fetch(jsonUrl, { headers: { 'Authorization': `token ${ghToken}` } });
        const fileData = await fileRes.json();

        // Kaydederken diziyi tekrar orijinal (tarih sırasına) çevirip kaydet
        const kaydedilecekData = [...dProjeler].reverse();

        const updateRes = await fetch(jsonUrl, {
            method: 'PUT',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: 'Veri guncelleme',
                content: btoa(unescape(encodeURIComponent(JSON.stringify(kaydedilecekData, null, 4)))),
                sha: fileData.sha
            })
        });

        if (updateRes.ok) alert("Başarıyla yayınlandı!");
        else alert("Bir hata oluştu.");

    } catch (e) {
        alert("Hata: " + e.message);
    } finally {
        loader.style.display = "none";
        dGoster();
    }
};

// Başlangıç
dVeriYukle();
</script>
