<style>
    .dragon-container { max-width: 500px; margin: 20px auto; padding: 15px; text-align: center; font-family: sans-serif; position: relative; }
    .logo-area img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0f0f0; margin-bottom: 10px; }

    .kart-cerceve { min-height: 300px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    .proje-kart {
        background: white; width: 100%; padding: 20px; border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid #c0392b;
        text-align: left; position: relative;
    }

    [contenteditable="true"] { border: 1px dashed #c0392b; padding: 5px; border-radius: 4px; background-color: #fffcfc; outline: none; }

    .k-tarih { color: #bbb; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .k-metin { color: #555; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
    .k-img { width: 100%; border-radius: 8px; margin-top: 15px; display: block; object-fit: cover; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .nav-btn { background: #34495e; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
    .nav-btn:disabled { background: #eee; color: #ccc; cursor: not-allowed; }

    /* Admin Paneli & Yeni Butonlar */
    .admin-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; margin: 0 10px; }
    .save-btn { background: #27ae60 !important; font-weight: bold; width: 100%; }
    .delete-btn { background: #c0392b !important; margin-top: 15px; font-size: 0.8rem; width: 100%; }
    .new-btn { background: #2980b9 !important; margin-bottom: 20px; width: 100%; }

    #admin-form { display: none; margin-top: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    .admin-input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }

    .loading-overlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction: column; font-weight: bold; color: #c0392b; }
</style>

<div id="loader" class="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #c0392b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;"></div>
    YAYINLANIYOR...
</div>

<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

<div class="dragon-container">
    <div class="logo-area">
        <img src="images/dragon-logo.png" alt="Dragon Logo" onerror="this.src='https://via.placeholder.com/80'">
        <h2 style="margin:0; color:#2c3e50;">Dragon Helmet</h2>
        <div style="width:30px; height:2px; background:#c0392b; margin:10px auto;"></div>
    </div>

    <div id="admin-extra" style="display:none;">
        <button class="nav-btn new-btn" onclick="yeniProjeEkle()">+ Yeni Proje Ekle</button>
    </div>

    <div class="kart-cerceve" id="proje-yukleme-alani">
        <p style="color:#ccc;">Yükleniyor...</p>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="btnGeri" onclick="projeDegistir(-1)">❮</button>
        <div class="admin-controls" id="admin-actions" style="display:none;">
            <button class="nav-btn save-btn" onclick="githubKaydet()">YAYINLA</button>
        </div>
        <button class="nav-btn" id="btnIleri" onclick="projeDegistir(1)">❯</button>
    </div>

    <div class="admin-giris-alani" style="margin-top:30px;">
        <small id="admin-toggle" style="color: #f0f0f0; cursor: pointer; user-select: none;" onclick="document.getElementById('admin-form').style.display='block'">Yönetim</small>
        <div id="admin-form">
            <input type="password" id="adminToken" class="admin-input" placeholder="GitHub Token">
            <button class="nav-btn" style="width:100%" onclick="adminModunuAc()">Giriş Yap</button>
        </div>
    </div>
</div>

<script>
    let dProjeler = [];
    let dAktifIdx = 0;
    let isAdmin = false;
    let ghToken = "";
    const REPO = "talhacelikozgen/DragonWeb";

    async function dVeriYukle() {
        try {
            const res = await fetch('data/projeler.json?t=' + Date.now());
            dProjeler = await res.json();
            // JSON zaten eskiyse reverse yapıyoruz
            dGoster();
        } catch (err) { 
            console.error("Yükleme hatası");
            document.getElementById('proje-yukleme-alani').innerHTML = "Veri bulunamadı.";
        }
    }

    function dGoster() {
        const alan = document.getElementById('proje-yukleme-alani');
        const p = dProjeler[dAktifIdx];
        if(!p) return;

        const editable = isAdmin ? 'contenteditable="true"' : '';
        
        // Resim yolunu temizle (eğer veritabanında images/ ile başlıyorsa temizle, sonra biz ekleyelim)
        let temizGorsel = p.gorsel ? p.gorsel.replace('images/', '') : '';
        let imgHtml = temizGorsel ? `<img src="images/${temizGorsel}" class="k-img" onerror="this.style.display='none'">` : '<p style="color:#ccc; font-size:0.8rem; margin-top:15px;">Görsel yok</p>';

        alan.innerHTML = `
            <div class="proje-kart">
                <div class="k-tarih" ${editable} id="ed-tarih">${p.tarih}</div>
                <div class="k-baslik" ${editable} id="ed-baslik">${p.baslik}</div>
                <div class="k-metin" ${editable} id="ed-metin">${p.metin}</div>
                <div id="img-container">${imgHtml}</div>
                ${isAdmin ? `
                    <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                        <label style="font-size:0.7rem; color:#666; display:block; margin-bottom:5px;">Görsel Yükle (PNG/JPG):</label>
                        <input type="file" id="file-input" accept="image/*" style="font-size:0.7rem; width:100%;">
                        <button class="nav-btn delete-btn" onclick="projeSil()">Bu Projeyi Sil</button>
                    </div>
                ` : ''}
            </div>
        `;
        document.getElementById('btnGeri').disabled = (dAktifIdx === 0);
        document.getElementById('btnIleri').disabled = (dAktifIdx === dProjeler.length - 1);
    }

    function projeDegistir(yon) { 
        if(dAktifIdx + yon >= 0 && dAktifIdx + yon < dProjeler.length) {
            dAktifIdx += yon; 
            dGoster(); 
        }
    }

    function adminModunuAc() {
        ghToken = document.getElementById('adminToken').value;
        if(ghToken.length < 10) return alert("Hatalı Token!");
        isAdmin = true;
        document.getElementById('admin-form').style.display = 'none';
        document.getElementById('admin-actions').style.display = 'block';
        document.getElementById('admin-extra').style.display = 'block';
        dGoster();
    }

    function yeniProjeEkle() {
        const simdi = new Date();
        const tarihStr = `${simdi.getDate()} Nisan ${simdi.getFullYear()}`;
        const yeni = { 
            id: Date.now(), 
            tarih: tarihStr, 
            baslik: "Yeni Başlık", 
            metin: "İçeriği buraya yazın...", 
            gorsel: "" 
        };
        dProjeler.unshift(yeni); // En başa ekle
        dAktifIdx = 0;
        dGoster();
    }

    function projeSil() {
        if(!confirm("Bu proje kalıcı olarak silinecek. Onaylıyor musunuz?")) return;
        dProjeler.splice(dAktifIdx, 1);
        dAktifIdx = 0;
        if(dProjeler.length === 0) {
            yeniProjeEkle();
        } else {
            dGoster();
        }
    }

    async function githubKaydet() {
        const loader = document.getElementById('loader');
        loader.style.display = "flex";

        try {
            const p = dProjeler[dAktifIdx];
            p.tarih = document.getElementById('ed-tarih').innerText.trim();
            p.baslik = document.getElementById('ed-baslik').innerText.trim();
            p.metin = document.getElementById('ed-metin').innerText.trim();

            const fileInput = document.getElementById('file-input');
            
            // 1. GÖRSEL YÜKLEME (Varsa)
            if(fileInput && fileInput.files[0]) {
                const file = fileInput.files[0];
                const simdi = new Date();
                // Saat-Gün-Ay-Yıl formatı: 1630-17-4-2026.png
                const dosyaAdi = `${simdi.getHours()}${simdi.getMinutes()}-${simdi.getDate()}-${simdi.getMonth()+1}-${simdi.getFullYear()}.png`;
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                await new Promise(res => reader.onload = res);
                const base64Content = reader.result.split(',')[1];

                const imgUrl = `https://api.github.com/repos/${REPO}/contents/images/${dosyaAdi}`;
                
                await fetch(imgUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Resim: " + dosyaAdi, content: base64Content })
                });
                p.gorsel = dosyaAdi; // Sadece dosya adını kaydet
            }

            // 2. JSON GÜNCELLEME
            const jsonPath = "data/projeler.json";
            const jsonUrl = `https://api.github.com/repos/${REPO}/contents/${jsonPath}`;
            
            const getFile = await fetch(jsonUrl, { headers: { 'Authorization': `token ${ghToken}` } });
            const fileData = await getFile.json();
            
            // Dosyaya kaydederken orijinal sıraya çevir (reverse geri al)
            const kaydedilecekDizi = [...dProjeler].reverse();

            const putRes = await fetch(jsonUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Proje Güncelleme",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(kaydedilecekDizi, null, 4)))),
                    sha: fileData.sha
                })
            });

            if(putRes.ok) {
                alert("Yayınlandı! Değişikliklerin görünmesi 1-2 dakika sürebilir.");
            } else {
                throw new Error("GitHub kayıt hatası.");
            }
        } catch (e) { 
            alert("Hata: " + e.message); 
        } finally {
            loader.style.display = "none";
            dGoster();
        }
    }

    dVeriYukle();
</script>
