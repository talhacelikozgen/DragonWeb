<style>
    .dragon-container { max-width: 500px; margin: 20px auto; padding: 15px; text-align: center; font-family: sans-serif; position: relative; }
    .logo-area img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f0f0f0; margin-bottom: 10px; }

    .kart-cerceve { min-height: 300px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    .proje-kart {
        background: white; width: 100%; padding: 20px; border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid #c0392b;
        text-align: left; position: relative;
    }

    /* Düzenlenebilir Alan Efekti */
    [contenteditable="true"] { 
        border: 1px dashed #c0392b; 
        padding: 5px; 
        border-radius: 4px; 
        background-color: #fffcfc;
    }

    .k-tarih { color: #bbb; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
    .k-baslik { color: #2c3e50; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
    .k-metin { color: #555; font-size: 0.95rem; line-height: 1.5; }
    .k-img { width: 100%; border-radius: 8px; margin-top: 15px; display: block; }

    .nav-bar { display: flex; justify-content: space-between; align-items: center; }
    .nav-btn { background: #34495e; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; }
    .nav-btn:disabled { background: #eee; color: #ccc; cursor: not-allowed; }
    .sayfalar { font-size: 0.85rem; color: #999; font-weight: bold; }

    /* Admin Paneli Stilleri */
    .admin-giris-alani { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
    #admin-form { display: none; margin-top: 10px; }
    .admin-input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 80%; max-width: 250px; }
    .edit-badge { 
        display: none; position: absolute; top: -10px; right: -10px; 
        background: #e67e22; color: white; padding: 4px 8px; 
        border-radius: 4px; font-size: 0.7rem; font-weight: bold;
    }
</style>

<div class="dragon-container">
    <div class="logo-area">
        <img src="images/dragon-logo.png" alt="Dragon Logo">
        <h2 style="margin:0; color:#2c3e50;">Dragon Helmet</h2>
        <div style="width:30px; height:2px; background:#c0392b; margin:10px auto;"></div>
    </div>

    <div class="kart-cerceve" id="proje-yukleme-alani">
        <p style="color:#ccc;">Projeler aranıyor...</p>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" id="btnGeri" onclick="projeDegistir(-1)">❮</button>
        <span class="sayfalar" id="sayfaBilgi">0 / 0</span>
        <button class="nav-btn" id="btnIleri" onclick="projeDegistir(1)">❯</button>
    </div>

    <div class="admin-giris-alani">
        <small id="admin-ac-btn" style="color: #eee; cursor: pointer;" onclick="toggleAdminForm()">Yönetim</small>
        <div id="admin-form">
            <input type="password" id="adminToken" class="admin-input" placeholder="GitHub Token Giriniz">
            <button class="nav-btn" style="padding: 8px 15px; background: #2c3e50;" onclick="adminModunuAc()">Giriş</button>
        </div>
    </div>
</div>

<script>
    let dProjeler = [];
    let dAktifIdx = 0;
    let isAdmin = false;

    async function dVeriYukle() {
        const alan = document.getElementById('proje-yukleme-alani');
        try {
            const res = await fetch('data/projeler.json?t=' + Date.now());
            if (!res.ok) throw new Error("JSON dosyasına ulaşılamadı.");
            dProjeler = await res.json();
            if (dProjeler.length === 0) {
                alan.innerHTML = "<p>Henüz proje eklenmemiş.</p>";
                return;
            }
            // Yeni haber en üstte
            dProjeler.reverse();
            dGoster();
        } catch (err) {
            alan.innerHTML = `<p style="color:red; font-size:0.8rem;">Hata: ${err.message}</p>`;
        }
    }

    function dGoster() {
        const alan = document.getElementById('proje-yukleme-alani');
        const p = dProjeler[dAktifIdx];
        
        let imgTag = "";
        if (p.gorsel) {
            const yol = p.gorsel.startsWith('images/') ? p.gorsel : 'images/' + p.gorsel;
            imgTag = `<img src="${yol}" class="k-img" onerror="this.style.display='none'">`;
        }

        // Admin modundaysak alanları düzenlenebilir yapıyoruz
        const editableAttr = isAdmin ? 'contenteditable="true"' : '';
        const badgeStyle = isAdmin ? 'display: block;' : '';

        alan.innerHTML = `
            <div class="proje-kart">
                <div class="edit-badge" style="${badgeStyle}">EDİT MODU</div>
                <div class="k-tarih" ${editableAttr} id="edit-tarih">${p.tarih}</div>
                <div class="k-baslik" ${editableAttr} id="edit-baslik">${p.baslik}</div>
                <div class="k-metin" ${editableAttr} id="edit-metin">${p.metin}</div>
                ${imgTag}
                ${isAdmin ? `<div style="margin-top:10px;"><small style="color:#bbb;">Görsel adı:</small> <input type="text" id="edit-gorsel" value="${p.gorsel}" class="admin-input" style="font-size:0.7rem; width:60%;"></div>` : ''}
            </div>
        `;

        document.getElementById('sayfaBilgi').innerText = `${dAktifIdx + 1} / ${dProjeler.length}`;
        document.getElementById('btnGeri').disabled = (dAktifIdx === 0);
        document.getElementById('btnIleri').disabled = (dAktifIdx === dProjeler.length - 1);
    }

    function projeDegistir(yon) {
        dAktifIdx += yon;
        dGoster();
    }

    // ADMİN MODU FONKSİYONLARI
    function toggleAdminForm() {
        const form = document.getElementById('admin-form');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function adminModunuAc() {
        const token = document.getElementById('adminToken').value;
        if (token.length > 5) { // Basit bir kontrol, asıl kontrol 4. adımda kayıt yaparken olacak
            isAdmin = true;
            alert("Edit modu aktif! Kartlardaki yazıların üzerine tıklayarak değiştirebilirsiniz.");
            document.getElementById('admin-form').style.display = 'none';
            dGoster();
        } else {
            alert("Lütfen geçerli bir token girin.");
        }
    }

    dVeriYukle();
</script>
