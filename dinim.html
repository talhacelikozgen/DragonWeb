<div class="admin-area">
    <small onclick="document.getElementById('admin-panel').style.display='block'" style="cursor:pointer; color:#bbb;">Yönetim</small>
    <div id="admin-panel">
        <input type="password" id="token" class="admin-input" placeholder="Token"> <br>
        <input type="text" id="yeni-tarih" class="admin-input" placeholder="04-16"> <br>
        <textarea id="yeni-metin" class="admin-input" rows="2" placeholder="Nasihat metni..."></textarea> <br>
        <button onclick="yayinla()" style="padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer;">YAYINLA</button>
        <p id="durum" style="font-size: 0.85rem; margin-top: 8px; font-weight: bold;"></p>
    </div>
</div>

<script>
    var bugunkuSozler = [];
    var aktifIndex = 0;
    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

    async function veriyiYukle() {
        const simdi = new Date();
        document.getElementById('gercek-tarih').innerText = simdi.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('gun-adi').innerText = simdi.toLocaleDateString('tr-TR', { weekday: 'long' });
        try {
            const response = await fetch('data/arsiv.json?t=' + new Date().getTime());
            const veriler = await response.json();
            const anahtar = `${String(simdi.getMonth() + 1).padStart(2, '0')}-${String(simdi.getDate()).padStart(2, '0')}`;
            bugunkuSozler = Array.isArray(veriler[anahtar]) ? veriler[anahtar] : (veriler[anahtar] ? [veriler[anahtar]] : []);
            goster();
        } catch (e) { document.getElementById('nasihat-metni').innerText = "Hata oluştu."; }
    }

    function goster() {
        if (bugunkuSozler.length === 0) {
            document.getElementById('nasihat-metni').innerText = "Kayıt bulunamadı.";
            return;
        }
        document.getElementById('nasihat-metni').innerText = bugunkuSozler[aktifIndex];
        document.getElementById('sayfa-bilgi').innerText = `${aktifIndex + 1} / ${bugunkuSozler.length}`;
        document.getElementById('prev-btn').disabled = aktifIndex === 0;
        document.getElementById('next-btn').disabled = aktifIndex === bugunkuSozler.length - 1;
    }

    function degistir(yon) { aktifIndex += yon; goster(); }

    async function yayinla() {
        const token = document.getElementById('token').value;
        const tarih = document.getElementById('yeni-tarih').value;
        const metin = document.getElementById('yeni-metin').value;
        const durum = document.getElementById('durum');
        if(!token || !tarih || !metin) return;
        durum.innerText = "İşleniyor...";
        const url = `https://api.github.com/repos/talhacelikozgen/DragonWeb/contents/arsiv.json`;
        try {
            const res = await fetch(url, { headers: { Authorization: `token ${token}` } });
            const fileData = await res.json();
            let decoded = decodeURIComponent(atob(fileData.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            let content = JSON.parse(decoded);
            if (!Array.isArray(content[tarih])) content[tarih] = content[tarih] ? [content[tarih], metin] : [metin];
            else content[tarih].push(metin);
            const base64 = btoa(encodeURIComponent(JSON.stringify(content, null, 4)).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
            const update = await fetch(url, {
                method: "PUT",
                headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `${tarih} eklendi`, content: base64, sha: fileData.sha })
            });
            durum.innerText = update.ok ? "Başarıyla Yayınlandı!" : "Hata!";
        } catch (e) { durum.innerText = "Hata!"; }
    }
    veriyiYukle();
</script>
